<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>🎬 Regia WebRTC - ARK Games</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #1a1a24;
      --accent: #e94560;
      --success: #2ecc71;
      --warning: #f1c40f;
      --border: #2a2a3a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }
    
    .header {
      background: #12121a;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 18px; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #888; }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
    .header .actions { margin-left: auto; display: flex; gap: 10px; }
    .btn { padding: 10px 16px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn:hover { transform: scale(1.02); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--card); color: white; }
    .btn-success { background: var(--success); color: white; }
    
    .main { display: grid; grid-template-columns: 1fr 300px; height: calc(100vh - 56px); }
    
    /* Responsive */
    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { 
        position: fixed;
        right: 0;
        top: 56px;
        bottom: 0;
        width: 280px;
        transform: translateX(100%);
        transition: transform 0.3s;
        z-index: 100;
      }
      .sidebar.open { transform: translateX(0); }
      .grid { grid-template-columns: repeat(2, 1fr); }
      .toggle-sidebar {
        display: flex !important;
        position: fixed;
        right: 15px;
        bottom: 15px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: var(--accent);
        color: white;
        border: none;
        font-size: 20px;
        align-items: center;
        justify-content: center;
        z-index: 101;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
    }
    @media (min-width: 901px) {
      .toggle-sidebar { display: none; }
    }
    
    .preview-area { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
    
    .main-preview {
      flex: 1;
      background: #000;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }
    .main-preview video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .main-preview .no-feed {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      flex-direction: column;
      gap: 10px;
    }
    .main-preview .no-feed .icon { font-size: 48px; }
    
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .slot {
      aspect-ratio: 16/9;
      background: var(--card);
      border-radius: 8px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .slot:hover { border-color: var(--border); }
    .slot.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(233,69,96,0.3); }
    .slot video { width: 100%; height: 100%; object-fit: cover; }
    .slot .label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      font-size: 11px;
    }
    .slot .indicator {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
    }
    .slot .indicator.live { background: var(--success); animation: pulse 2s infinite; }
    .slot .indicator.connecting { background: var(--warning); animation: blink 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    @keyframes blink { 50% { opacity: 0.3; } }
    
    .sidebar {
      background: #12121a;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-section {
      padding: 15px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-section h3 .count {
      background: var(--card);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
    }
    
    .camera-list { flex: 1; overflow-y: auto; padding: 10px; }
    .cam-item {
      background: var(--card);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cam-item .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cam-item .dot.waiting { background: var(--warning); }
    .cam-item .dot.streaming { background: var(--success); }
    .cam-item .dot.disconnected, .cam-item .dot.failed { background: #e74c3c; }
    .cam-item .dot.background { background: #9b59b6; }
    .cam-item .info { flex: 1; min-width: 0; }
    .cam-item .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cam-item .meta { font-size: 10px; color: #888; margin-top: 2px; }
    .cam-item select {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: white;
      font-size: 11px;
      cursor: pointer;
    }
    .cam-item .reconnect-btn {
      padding: 4px 8px;
      font-size: 10px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
    }
    
    .empty { text-align: center; color: #666; padding: 30px; font-size: 13px; }
    
    .log-section {
      border-top: 1px solid var(--border);
      max-height: 150px;
      overflow-y: auto;
      padding: 10px;
      font-family: monospace;
      font-size: 10px;
      color: #888;
    }
    .log-section .log-entry { padding: 2px 0; }
    .log-section .log-entry.error { color: #e74c3c; }
    .log-section .log-entry.success { color: var(--success); }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎬 Regia WebRTC</h1>
    <div class="status">
      <div class="dot"></div>
      <span id="statusText">In ascolto...</span>
    </div>
    <div class="actions">
      <button class="btn btn-secondary" onclick="refreshAll()">🔄 Riconnetti Tutte</button>
      <button class="btn btn-secondary" onclick="cleanupStale()">🧹 Pulisci</button>
      <button class="btn btn-primary" onclick="toggleFullscreen()">⛶</button>
    </div>
  </div>
  
  <div class="main">
    <div class="preview-area">
      <div class="main-preview" id="mainPreview">
        <video id="mainVideo" autoplay playsinline muted></video>
        <div class="no-feed" id="noFeed">
          <div class="icon">📹</div>
          <p>Seleziona una camera</p>
        </div>
      </div>
      
      <div class="grid" id="slotGrid">
        <div class="slot" data-slot="0" onclick="selectSlot(0)">
          <video autoplay playsinline muted></video>
          <div class="indicator"></div>
          <div class="label">Lane 1</div>
        </div>
        <div class="slot" data-slot="1" onclick="selectSlot(1)">
          <video autoplay playsinline muted></video>
          <div class="indicator"></div>
          <div class="label">Lane 2</div>
        </div>
        <div class="slot" data-slot="2" onclick="selectSlot(2)">
          <video autoplay playsinline muted></video>
          <div class="indicator"></div>
          <div class="label">Lane 3</div>
        </div>
        <div class="slot" data-slot="3" onclick="selectSlot(3)">
          <video autoplay playsinline muted></video>
          <div class="indicator"></div>
          <div class="label">Overview</div>
        </div>
      </div>
    </div>
    
    <div class="sidebar">
      <div class="sidebar-section">
        <h3>
          📷 Camere Disponibili
          <span class="count" id="camCount">0</span>
        </h3>
      </div>
      <div class="camera-list" id="cameraList">
        <div class="empty">In attesa di camere...<br><br>Apri <b>camera-webrtc.html</b><br>sui telefoni</div>
      </div>
      <div class="log-section" id="logSection"></div>
    </div>
    
    <button class="toggle-sidebar" onclick="toggleSidebar()">📷</button>
  </div>

  <script type="module">
    import { DB } from './firebase-config.js';
    
    const ICE_SERVERS = [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ];
    
    const STALE_TIMEOUT = 30000; // 30 seconds without heartbeat = stale
    
    // State
    const cameras = new Map(); // camId -> { info, peerConnection, stream, unsubscribers, addedCandidates }
    const slots = [null, null, null, null]; // slot index -> camId
    let activeSlot = null;
    
    function log(msg, type = 'info') {
      console.log(`[Regia] ${msg}`);
      const section = document.getElementById('logSection');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `${new Date().toLocaleTimeString()} - ${msg}`;
      section.insertBefore(entry, section.firstChild);
      
      // Keep only last 50 entries
      while (section.children.length > 50) {
        section.removeChild(section.lastChild);
      }
    }
    
    // Listen for cameras
    DB.listen('streams', (data) => {
      if (!data) {
        document.getElementById('cameraList').innerHTML = '<div class="empty">Nessuna camera online</div>';
        document.getElementById('camCount').textContent = '0';
        return;
      }
      
      const now = Date.now();
      
      // Update camera list
      for (const [camId, info] of Object.entries(data)) {
        if (!cameras.has(camId)) {
          // New camera discovered
          cameras.set(camId, { 
            info, 
            peerConnection: null, 
            stream: null,
            unsubscribers: [],
            addedCandidates: new Set()
          });
          log(`Nuova camera: ${info.name || camId}`, 'success');
        } else {
          // Update existing camera info
          cameras.get(camId).info = info;
        }
      }
      
      // Remove disconnected cameras (not in Firebase anymore)
      for (const camId of cameras.keys()) {
        if (!data[camId]) {
          disconnectCamera(camId);
          cameras.delete(camId);
          
          // Remove from slot
          const slotIdx = slots.indexOf(camId);
          if (slotIdx >= 0) {
            slots[slotIdx] = null;
            updateSlot(slotIdx);
          }
          
          log(`Camera rimossa: ${camId}`);
        }
      }
      
      document.getElementById('camCount').textContent = cameras.size.toString();
      document.getElementById('statusText').textContent = `${cameras.size} camere`;
      renderCameraList();
    });
    
    function disconnectCamera(camId) {
      const cam = cameras.get(camId);
      if (!cam) return;
      
      // Cleanup unsubscribers
      cam.unsubscribers.forEach(fn => fn?.());
      cam.unsubscribers = [];
      
      // Close peer connection
      if (cam.peerConnection) {
        cam.peerConnection.ontrack = null;
        cam.peerConnection.onicecandidate = null;
        cam.peerConnection.onconnectionstatechange = null;
        cam.peerConnection.close();
        cam.peerConnection = null;
      }
      
      cam.stream = null;
      cam.addedCandidates.clear();
    }
    
    function renderCameraList() {
      const list = document.getElementById('cameraList');
      
      if (cameras.size === 0) {
        list.innerHTML = '<div class="empty">Nessuna camera online</div>';
        return;
      }
      
      const now = Date.now();
      
      list.innerHTML = Array.from(cameras.entries()).map(([camId, cam]) => {
        const status = cam.info.status || 'waiting';
        const assignedSlot = slots.indexOf(camId);
        const lastHB = cam.info.lastHeartbeat || 0;
        const isStale = (now - lastHB) > STALE_TIMEOUT;
        const ago = lastHB ? Math.round((now - lastHB) / 1000) + 's ago' : 'never';
        
        return `
          <div class="cam-item">
            <div class="dot ${isStale ? 'disconnected' : status}"></div>
            <div class="info">
              <div class="name">${cam.info.name || 'Camera'}</div>
              <div class="meta">${cam.info.quality || '?'}p · HB: ${ago}</div>
            </div>
            ${status === 'failed' || isStale ? 
              `<button class="reconnect-btn" onclick="reconnectCamera('${camId}')">↻</button>` : 
              ''}
            <select onchange="assignCamera('${camId}', this.value)">
              <option value="">--</option>
              <option value="0" ${assignedSlot===0?'selected':''}>Lane 1</option>
              <option value="1" ${assignedSlot===1?'selected':''}>Lane 2</option>
              <option value="2" ${assignedSlot===2?'selected':''}>Lane 3</option>
              <option value="3" ${assignedSlot===3?'selected':''}>Overview</option>
            </select>
          </div>
        `;
      }).join('');
    }
    
    window.reconnectCamera = async (camId) => {
      const slotIdx = slots.indexOf(camId);
      if (slotIdx >= 0) {
        log(`Riconnessione camera ${camId}...`);
        disconnectCamera(camId);
        cameras.get(camId).addedCandidates = new Set();
        await connectToCamera(camId, slotIdx);
      }
    };
    
    window.assignCamera = async (camId, slotStr) => {
      const slotIdx = slotStr === '' ? -1 : parseInt(slotStr);
      
      // Remove from previous slot
      const prevSlot = slots.indexOf(camId);
      if (prevSlot >= 0) {
        slots[prevSlot] = null;
        updateSlot(prevSlot);
      }
      
      if (slotIdx < 0) {
        // Just unassign
        disconnectCamera(camId);
        renderCameraList();
        log(`Camera ${camId} rimossa dallo slot`);
        return;
      }
      
      // Remove previous camera from this slot
      if (slots[slotIdx]) {
        const oldCamId = slots[slotIdx];
        disconnectCamera(oldCamId);
      }
      
      slots[slotIdx] = camId;
      updateSlot(slotIdx);
      
      // Connect via WebRTC
      await connectToCamera(camId, slotIdx);
      
      renderCameraList();
    };
    
    async function connectToCamera(camId, slotIdx) {
      const cam = cameras.get(camId);
      if (!cam) return;
      
      const slot = document.querySelector(`[data-slot="${slotIdx}"]`);
      const indicator = slot.querySelector('.indicator');
      indicator.className = 'indicator connecting';
      
      log(`Connessione a ${cam.info.name || camId}...`);
      
      // Cleanup any existing connection
      disconnectCamera(camId);
      cam.addedCandidates = new Set();
      
      // Clear previous signaling data
      try {
        await DB.remove(`streams/${camId}/viewerOffer`);
        await DB.remove(`streams/${camId}/viewerCandidates`);
        await DB.remove(`streams/${camId}/cameraAnswer`);
        await DB.remove(`streams/${camId}/cameraCandidates`);
      } catch (e) {}
      
      // Small delay to ensure Firebase sync
      await new Promise(r => setTimeout(r, 200));
      
      // Create peer connection
      const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
      cam.peerConnection = pc;
      
      // Handle incoming stream
      pc.ontrack = (e) => {
        log(`Stream ricevuto da ${cam.info.name || camId}`, 'success');
        cam.stream = e.streams[0];
        const video = slot.querySelector('video');
        video.srcObject = e.streams[0];
        indicator.className = 'indicator live';
        
        // If this is active slot, show in main
        if (activeSlot === slotIdx) {
          document.getElementById('mainVideo').srcObject = e.streams[0];
          document.getElementById('noFeed').style.display = 'none';
        }
      };
      
      // ICE candidates
      pc.onicecandidate = async (e) => {
        if (e.candidate) {
          // Skip mDNS .local addresses - mobile can't resolve them
          if (e.candidate.candidate.includes('.local')) {
            log('Skipped mDNS candidate');
            return;
          }
          const candId = `${Date.now()}_${Math.random().toString(36).substr(2, 4)}`;
          await DB.set(`streams/${camId}/viewerCandidates/${candId}`, e.candidate.toJSON());
        }
      };
      
      // Connection state
      pc.onconnectionstatechange = () => {
        const state = pc.connectionState;
        log(`${cam.info.name || camId}: ${state}`);
        
        if (state === 'connected') {
          indicator.className = 'indicator live';
        } else if (state === 'disconnected') {
          indicator.className = 'indicator connecting';
        } else if (state === 'failed') {
          indicator.className = 'indicator';
          log(`Connessione fallita: ${cam.info.name || camId}`, 'error');
        }
        
        renderCameraList();
      };
      
      // Create offer
      pc.addTransceiver('video', { direction: 'recvonly' });
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      
      // Send offer to camera
      await DB.set(`streams/${camId}/viewerOffer`, {
        type: offer.type,
        sdp: offer.sdp
      });
      
      log(`Offer inviato a ${cam.info.name || camId}`);
      
      // Listen for answer - start ICE candidate listener AFTER setRemoteDescription
      let candidateListenerStarted = false;
      
      const unsubAnswer = DB.listen(`streams/${camId}/cameraAnswer`, async (answer) => {
        if (!answer || !pc || pc.signalingState === 'stable') return;
        
        try {
          await pc.setRemoteDescription(new RTCSessionDescription(answer));
          log(`Answer ricevuto da ${cam.info.name || camId}`, 'success');
          
          // NOW start listening for ICE candidates (after remote description is set)
          if (!candidateListenerStarted) {
            candidateListenerStarted = true;
            startCandidateListener(camId, cam, pc);
          }
        } catch (e) {
          log(`Errore answer: ${e.message}`, 'error');
        }
      });
      cam.unsubscribers.push(unsubAnswer);
    }
    
    function startCandidateListener(camId, cam, pc) {
      const unsubCands = DB.listen(`streams/${camId}/cameraCandidates`, async (candidates) => {
        if (!candidates || !pc) return;
        
        for (const [id, candidate] of Object.entries(candidates)) {
          // Skip already added
          if (cam.addedCandidates.has(id)) continue;
          
          try {
            await pc.addIceCandidate(new RTCIceCandidate(candidate));
            cam.addedCandidates.add(id);
          } catch (e) {
            log(`ICE candidate error: ${e.message}`, 'error');
          }
        }
      });
      cam.unsubscribers.push(unsubCands);
    }
    
    function updateSlot(slotIdx) {
      const slot = document.querySelector(`[data-slot="${slotIdx}"]`);
      const video = slot.querySelector('video');
      const indicator = slot.querySelector('.indicator');
      
      const camId = slots[slotIdx];
      if (!camId) {
        video.srcObject = null;
        indicator.className = 'indicator';
        return;
      }
      
      const cam = cameras.get(camId);
      if (cam?.stream) {
        video.srcObject = cam.stream;
        indicator.className = 'indicator live';
      }
    }
    
    window.selectSlot = (idx) => {
      document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
      document.querySelector(`[data-slot="${idx}"]`).classList.add('active');
      
      activeSlot = idx;
      const camId = slots[idx];
      const noFeed = document.getElementById('noFeed');
      const mainVideo = document.getElementById('mainVideo');
      
      if (camId && cameras.get(camId)?.stream) {
        noFeed.style.display = 'none';
        mainVideo.srcObject = cameras.get(camId).stream;
      } else {
        noFeed.style.display = 'flex';
        mainVideo.srcObject = null;
      }
    };
    
    window.refreshAll = async () => {
      log('Riconnessione di tutte le camere...');
      for (let i = 0; i < slots.length; i++) {
        if (slots[i]) {
          const camId = slots[i];
          disconnectCamera(camId);
          cameras.get(camId).addedCandidates = new Set();
          await connectToCamera(camId, i);
          await new Promise(r => setTimeout(r, 500)); // Stagger reconnections
        }
      }
    };
    
    window.cleanupStale = async () => {
      const now = Date.now();
      let cleaned = 0;
      
      for (const [camId, cam] of cameras.entries()) {
        const lastHB = cam.info.lastHeartbeat || 0;
        if ((now - lastHB) > STALE_TIMEOUT) {
          try {
            await DB.remove(`streams/${camId}`);
            cleaned++;
          } catch (e) {}
        }
      }
      
      log(`Pulite ${cleaned} camere stale`);
    };
    
    window.toggleFullscreen = () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    };
    
    window.toggleSidebar = () => {
      document.querySelector('.sidebar').classList.toggle('open');
    };
    
    // Auto-refresh camera list periodically to update heartbeat status
    setInterval(renderCameraList, 5000);
    
    log('Regia WebRTC avviata', 'success');
  </script>
</body>
</html>
