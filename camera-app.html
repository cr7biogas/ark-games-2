<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>📷 ARK Camera</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .video-container {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(rgba(0,0,0,0.8), transparent);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .status .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e74c3c;
    }
    .status .dot.connected { background: #2ecc71; }
    .status .dot.waiting { background: #f1c40f; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
    
    .camera-name {
      background: rgba(233,69,96,0.9);
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
    }
    
    .info-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 30px 20px 20px;
    }
    
    .ip-display {
      text-align: center;
      margin-bottom: 15px;
    }
    .ip-display .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
    }
    .ip-display .ip {
      font-size: 32px;
      font-weight: 800;
      font-family: 'SF Mono', Monaco, monospace;
      color: #2ecc71;
    }
    .ip-display .port {
      font-size: 18px;
      color: #888;
    }
    
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    
    .btn {
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary {
      background: #e94560;
      color: white;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    
    .setup-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
      z-index: 100;
    }
    .setup-screen.hidden { display: none; }
    
    .setup-screen .logo {
      font-size: 80px;
      margin-bottom: 20px;
    }
    .setup-screen h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }
    .setup-screen p {
      color: #888;
      margin-bottom: 30px;
      max-width: 300px;
    }
    
    .setup-screen input {
      width: 100%;
      max-width: 280px;
      padding: 16px;
      border-radius: 12px;
      border: 2px solid #333;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 18px;
      text-align: center;
      margin-bottom: 20px;
    }
    .setup-screen input:focus {
      outline: none;
      border-color: #e94560;
    }
    
    .setup-screen .btn {
      width: 100%;
      max-width: 280px;
      justify-content: center;
    }
    
    .qr-section {
      margin-top: 30px;
      padding: 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
    }
    .qr-section .label {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }
    
    .error-msg {
      background: rgba(231,76,60,0.2);
      color: #e74c3c;
      padding: 12px 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .error-msg.hidden { display: none; }
    
    .stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }
    .stats span { color: #fff; }
  </style>
</head>
<body>
  <!-- Setup Screen -->
  <div class="setup-screen" id="setupScreen">
    <div class="logo">📷</div>
    <h1>ARK Camera</h1>
    <p>Trasforma questo telefono in una camera per ARK Games</p>
    
    <div class="error-msg hidden" id="errorMsg"></div>
    
    <input type="text" id="cameraName" placeholder="Nome camera (es: Lane 1)" value="Camera">
    
    <button class="btn btn-primary" onclick="startCamera()">
      📹 Avvia Camera
    </button>
    
    <div class="qr-section">
      <div class="label">Scansiona dalla Regia per aggiungere</div>
      <div id="qrCode" style="width:150px;height:150px;background:#fff;margin:0 auto;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#000">
        QR
      </div>
    </div>
  </div>
  
  <!-- Camera View -->
  <div class="video-container">
    <video id="video" autoplay playsinline muted></video>
    
    <div class="overlay">
      <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Connessione...</span>
      </div>
      <div class="camera-name" id="cameraLabel">Camera</div>
    </div>
    
    <div class="info-panel">
      <div class="ip-display">
        <div class="label">INDIRIZZO CAMERA</div>
        <div class="ip" id="ipDisplay">---.---.---.---</div>
        <div class="port">Pronto per connessione</div>
      </div>
      
      <div class="controls">
        <button class="btn btn-secondary" onclick="switchCamera()">🔄 Cambia</button>
        <button class="btn btn-secondary" onclick="toggleFlash()">💡 Flash</button>
        <button class="btn btn-primary" onclick="stopCamera()">⏹️ Stop</button>
      </div>
      
      <div class="stats">
        FPS: <span id="fpsDisplay">0</span> |
        Viewers: <span id="viewerCount">0</span> |
        Quality: <span id="qualityDisplay">HD</span>
      </div>
    </div>
  </div>

  <script type="module">
    import { DB } from './firebase-config.js';
    
    let stream = null;
    let cameraId = null;
    let facingMode = 'environment'; // back camera
    let frameCount = 0;
    let lastFpsUpdate = Date.now();
    
    // Generate unique camera ID
    function generateId() {
      return 'cam_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    }
    
    // Get local IP (best effort - won't work in all browsers)
    async function getLocalIP() {
      try {
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel('');
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        return new Promise((resolve) => {
          pc.onicecandidate = (e) => {
            if (!e.candidate) return;
            const match = e.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
            if (match) {
              pc.close();
              resolve(match[1]);
            }
          };
          // Fallback after 2 seconds
          setTimeout(() => resolve('Connetti dalla Regia'), 2000);
        });
      } catch (e) {
        return 'Connetti dalla Regia';
      }
    }
    
    window.startCamera = async () => {
      const name = document.getElementById('cameraName').value.trim() || 'Camera';
      const errorEl = document.getElementById('errorMsg');
      
      try {
        // Request camera permission
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: facingMode,
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        
        // Show video
        const video = document.getElementById('video');
        video.srcObject = stream;
        
        // Hide setup screen
        document.getElementById('setupScreen').classList.add('hidden');
        
        // Set camera name
        document.getElementById('cameraLabel').textContent = name;
        
        // Generate camera ID
        cameraId = generateId();
        
        // Get local IP
        const ip = await getLocalIP();
        document.getElementById('ipDisplay').textContent = ip;
        
        // Register in Firebase for discovery
        await registerCamera(name, ip);
        
        // Start frame counter
        startFpsCounter();
        
      } catch (e) {
        errorEl.textContent = '❌ ' + (e.message || 'Errore accesso camera');
        errorEl.classList.remove('hidden');
        console.error(e);
      }
    };
    
    async function registerCamera(name, ip) {
      const compId = localStorage.getItem('ark2_compId') || 'default';
      
      await DB.set(`cameras/${cameraId}`, {
        name,
        ip,
        compId,
        status: 'online',
        createdAt: Date.now(),
        lastSeen: Date.now()
      });
      
      // Update lastSeen every 5 seconds
      setInterval(async () => {
        await DB.update(`cameras/${cameraId}`, { lastSeen: Date.now() });
      }, 5000);
      
      // Update status indicator
      document.getElementById('statusDot').classList.add('connected');
      document.getElementById('statusText').textContent = 'Connesso';
      
      // Listen for viewers
      DB.listen(`cameras/${cameraId}/viewers`, (count) => {
        document.getElementById('viewerCount').textContent = count || 0;
      });
    }
    
    window.switchCamera = async () => {
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      
      // Stop current stream
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }
      
      // Restart with new facing mode
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      
      document.getElementById('video').srcObject = stream;
    };
    
    window.toggleFlash = async () => {
      try {
        const track = stream?.getVideoTracks()[0];
        const capabilities = track?.getCapabilities();
        
        if (capabilities?.torch) {
          const settings = track.getSettings();
          await track.applyConstraints({
            advanced: [{ torch: !settings.torch }]
          });
        } else {
          alert('Flash non supportato');
        }
      } catch (e) {
        alert('Errore flash: ' + e.message);
      }
    };
    
    window.stopCamera = async () => {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
      }
      
      if (cameraId) {
        await DB.update(`cameras/${cameraId}`, { status: 'offline' });
      }
      
      document.getElementById('setupScreen').classList.remove('hidden');
    };
    
    function startFpsCounter() {
      const video = document.getElementById('video');
      
      const countFrame = () => {
        frameCount++;
        const now = Date.now();
        
        if (now - lastFpsUpdate >= 1000) {
          document.getElementById('fpsDisplay').textContent = frameCount;
          frameCount = 0;
          lastFpsUpdate = now;
        }
        
        requestAnimationFrame(countFrame);
      };
      
      video.addEventListener('play', () => requestAnimationFrame(countFrame));
    }
    
    // Cleanup on page close
    window.addEventListener('beforeunload', async () => {
      if (cameraId) {
        await DB.update(`cameras/${cameraId}`, { status: 'offline' });
      }
    });
  </script>
</body>
</html>
