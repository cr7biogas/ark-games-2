<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ARK Games - Competizioni CrossFit</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      min-height: 100dvh;
      color: white;
      display: flex;
      flex-direction: column;
    }
    
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
    }
    
    .logo { font-size: 5rem; margin-bottom: 20px; }
    .brand {
      font-size: 2.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f39c12, #e74c3c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .tagline { color: #888; font-size: 1.1rem; margin-bottom: 50px; }
    
    .choices { display: flex; flex-direction: column; gap: 20px; width: 100%; }
    
    .choice {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px 25px;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      color: inherit;
    }
    .choice:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.08);
    }
    .choice.athlete { border-color: #3498db; }
    .choice.athlete:hover { border-color: #3498db; background: rgba(52, 152, 219, 0.15); }
    .choice.admin { border-color: #f39c12; }
    .choice.admin:hover { border-color: #f39c12; background: rgba(243, 156, 18, 0.15); }
    
    .choice-icon { font-size: 3rem; margin-bottom: 15px; }
    .choice h2 { font-size: 1.4rem; margin-bottom: 8px; }
    .choice p { color: #888; font-size: 0.95rem; }
    
    .live-banner {
      margin-top: 40px;
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid rgba(231, 76, 60, 0.4);
      border-radius: 12px;
      padding: 15px 20px;
      width: 100%;
      cursor: pointer;
      transition: all 0.2s;
    }
    .live-banner:hover { background: rgba(231, 76, 60, 0.25); }
    .live-banner a { color: white; text-decoration: none; font-weight: 600; }
    .pulse {
      display: inline-block;
      width: 10px; height: 10px;
      background: #e74c3c;
      border-radius: 50%;
      margin-right: 10px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.4; } }
    
    .footer {
      padding: 20px;
      text-align: center;
      color: #555;
      font-size: 0.8rem;
    }
    .footer a { color: #888; text-decoration: none; }
    .footer a:hover { color: #f39c12; }
    
    /* Quick links for dev/existing features */
    .dev-links {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      width: 100%;
    }
    .dev-links summary {
      color: #666;
      font-size: 0.85rem;
      cursor: pointer;
      margin-bottom: 15px;
    }
    .dev-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .dev-btn {
      padding: 12px 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #888;
      text-decoration: none;
      font-size: 0.75rem;
      text-align: center;
      transition: all 0.2s;
    }
    .dev-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    .dev-btn .icon { font-size: 1.2rem; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🏆</div>
    <h1 class="brand">ARK GAMES</h1>
    <p class="tagline">Gestisci le tue competizioni CrossFit</p>
    
    <div class="choices">
      <a href="app/" class="choice athlete">
        <div class="choice-icon">💪</div>
        <h2>Sono un Atleta</h2>
        <p>Iscriviti alle gare e vedi i tuoi risultati</p>
      </a>
      
      <a href="admin/" class="choice admin">
        <div class="choice-icon">⚙️</div>
        <h2>Sono un Organizzatore</h2>
        <p>Gestisci il tuo box e le competizioni</p>
      </a>
    </div>
    
    <details class="dev-links">
      <summary>🔧 Accesso rapido (staff)</summary>
      <div class="dev-grid" style="grid-template-columns: 1fr;">
        <a href="judge.html" class="dev-btn"><span class="icon">⚖️</span>Giudice</a>
      </div>
    </details>
  </div>
  
  <footer class="footer">
    <p>ARK Games 2.0 · <a href="https://github.com/cr7biogas/ark-games-2">GitHub</a></p>
  </footer>
  
</body>
</html>
