<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>📺 Output - ARK Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }
    
    .container {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 350px;
    }
    
    /* Main video area */
    .main-video {
      position: relative;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .main-video video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .main-video .no-video {
      color: #444;
      font-size: 60px;
    }
    
    /* Overlay elements */
    .overlay-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 30px;
      background: linear-gradient(rgba(0,0,0,0.8), transparent);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    
    .logo {
      font-size: 28px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo .emoji { font-size: 36px; }
    
    .live-badge {
      background: #e94560;
      padding: 8px 20px;
      border-radius: 25px;
      font-weight: 700;
      font-size: 16px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 50% { opacity: 0.7; } }
    
    .overlay-timer {
      position: absolute;
      bottom: 30px;
      left: 30px;
      background: rgba(0,0,0,0.8);
      padding: 20px 40px;
      border-radius: 15px;
      border-left: 5px solid #e94560;
    }
    .timer-label {
      font-size: 14px;
      color: #888;
      margin-bottom: 5px;
    }
    .timer-value {
      font-size: 72px;
      font-weight: 800;
      font-family: 'SF Mono', Monaco, monospace;
    }
    .timer-value.countdown { color: #f1c40f; }
    .timer-value.running { color: #2ecc71; }
    .timer-value.stopped { color: #e74c3c; }
    
    .overlay-wod {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background: rgba(0,0,0,0.8);
      padding: 20px;
      border-radius: 15px;
      max-width: 300px;
      text-align: right;
    }
    .wod-name {
      font-size: 24px;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 10px;
    }
    .wod-desc {
      font-size: 14px;
      color: #ccc;
      line-height: 1.4;
    }
    
    /* Sidebar */
    .sidebar {
      background: #0a0a0f;
      border-left: 1px solid #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 20px;
      background: #111;
      border-bottom: 1px solid #222;
    }
    .sidebar-header h2 {
      font-size: 18px;
      margin-bottom: 15px;
    }
    
    .source-select {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .source-btn {
      padding: 12px;
      border-radius: 8px;
      border: 2px solid #333;
      background: #1a1a24;
      color: white;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }
    .source-btn:hover { border-color: #555; }
    .source-btn.active { border-color: #e94560; background: #2a1a24; }
    
    .sidebar-section {
      padding: 20px;
      border-bottom: 1px solid #222;
    }
    .sidebar-section h3 {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 15px;
    }
    
    .overlay-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }
    .overlay-toggle label { font-size: 14px; }
    .toggle-switch {
      width: 50px;
      height: 26px;
      background: #333;
      border-radius: 13px;
      position: relative;
      cursor: pointer;
    }
    .toggle-switch.on { background: #2ecc71; }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .toggle-switch.on::after { left: 26px; }
    
    /* Camera previews */
    .camera-grid {
      flex: 1;
      padding: 15px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      overflow-y: auto;
    }
    .cam-preview {
      aspect-ratio: 16/9;
      background: #1a1a24;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
    }
    .cam-preview:hover { border-color: #444; }
    .cam-preview.active { border-color: #e94560; }
    .cam-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cam-preview .label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 5px;
      background: rgba(0,0,0,0.7);
      font-size: 11px;
      text-align: center;
    }
    .cam-preview .status {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    .cam-preview .status.live { background: #2ecc71; }
  </style>
</head>
<body>
  <div class="container">
    <div class="main-video" id="mainVideo">
      <video id="outputVideo" autoplay playsinline muted></video>
      <div class="no-video" id="noVideo">📹</div>
      
      <!-- Overlays -->
      <div class="overlay-top">
        <div class="logo">
          <span class="emoji">🏋️</span>
          <span>ARK Games</span>
        </div>
        <div class="live-badge" id="liveBadge">🔴 LIVE</div>
      </div>
      
      <div class="overlay-timer" id="overlayTimer">
        <div class="timer-label">TEMPO</div>
        <div class="timer-value running" id="timerValue">00:00</div>
      </div>
      
      <div class="overlay-wod" id="overlayWod" style="display:none">
        <div class="wod-name" id="wodName">WOD 1</div>
        <div class="wod-desc" id="wodDesc">21-15-9 Thrusters & Pull-ups</div>
      </div>
    </div>
    
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>📺 Output Preview</h2>
        <div class="source-select" id="sourceSelect">
          <button class="source-btn" data-slot="0">Lane 1</button>
          <button class="source-btn" data-slot="1">Lane 2</button>
          <button class="source-btn" data-slot="2">Lane 3</button>
          <button class="source-btn" data-slot="3">Overview</button>
        </div>
      </div>
      
      <div class="sidebar-section">
        <h3>🎨 Overlay</h3>
        <div class="overlay-toggle">
          <label>Logo ARK</label>
          <div class="toggle-switch on" data-overlay="logo" onclick="toggleOverlay(this)"></div>
        </div>
        <div class="overlay-toggle">
          <label>Badge LIVE</label>
          <div class="toggle-switch on" data-overlay="live" onclick="toggleOverlay(this)"></div>
        </div>
        <div class="overlay-toggle">
          <label>Timer</label>
          <div class="toggle-switch on" data-overlay="timer" onclick="toggleOverlay(this)"></div>
        </div>
        <div class="overlay-toggle">
          <label>WOD Info</label>
          <div class="toggle-switch" data-overlay="wod" onclick="toggleOverlay(this)"></div>
        </div>
      </div>
      
      <h3 style="padding: 15px 20px 10px; font-size: 12px; color: #888;">📷 CAMERE</h3>
      <div class="camera-grid" id="cameraGrid">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <script type="module">
    import { DB } from './firebase-config.js';
    
    const ICE_SERVERS = [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ];
    
    const cameras = new Map();
    const slots = [null, null, null, null]; // slot -> camId
    let activeSlot = null;
    
    // Listen for streams (same as regia)
    DB.listen('streams', (data) => {
      if (!data) {
        cameras.clear();
        updateCameraGrid();
        return;
      }
      
      for (const [id, info] of Object.entries(data)) {
        if (!cameras.has(id)) {
          cameras.set(id, { info, pc: null, stream: null, unsubscribers: [], addedCandidates: new Set() });
        } else {
          cameras.get(id).info = info;
        }
      }
      
      for (const id of cameras.keys()) {
        if (!data[id]) {
          cameras.delete(id);
        }
      }
      
      updateCameraGrid();
    });
    
    function updateCameraGrid() {
      const grid = document.getElementById('cameraGrid');
      if (cameras.size === 0) {
        grid.innerHTML = '<div style="grid-column:span 2;text-align:center;color:#666;padding:30px">Nessuna camera</div>';
        return;
      }
      
      grid.innerHTML = Array.from(cameras.entries()).map(([id, cam]) => `
        <div class="cam-preview ${activeSlot !== null && slots[activeSlot] === id ? 'active' : ''}" data-cam="${id}" onclick="selectCamera('${id}')">
          <video autoplay playsinline muted></video>
          <div class="status ${cam.stream ? 'live' : ''}"></div>
          <div class="label">${cam.info.name || 'Camera'}</div>
        </div>
      `).join('');
      
      // Update video elements
      cameras.forEach((cam, id) => {
        const el = grid.querySelector(`[data-cam="${id}"] video`);
        if (el && cam.stream) el.srcObject = cam.stream;
      });
    }
    
    window.selectCamera = async (camId) => {
      const cam = cameras.get(camId);
      if (!cam) return;
      
      // If no stream, connect first
      if (!cam.stream) {
        await connectCamera(camId);
      }
      
      // Show in main output
      const outputVideo = document.getElementById('outputVideo');
      const noVideo = document.getElementById('noVideo');
      
      if (cam.stream) {
        outputVideo.srcObject = cam.stream;
        noVideo.style.display = 'none';
      }
      
      updateCameraGrid();
    };
    
    async function connectCamera(camId) {
      const cam = cameras.get(camId);
      if (!cam || cam.pc) return;
      
      // This output page is READ-ONLY - it watches the existing WebRTC streams
      // It connects to cameras that are already streaming to the regia
      
      // Actually, we need to create our OWN connection since WebRTC is peer-to-peer
      // We'll reuse the same signaling approach
      
      cam.addedCandidates = new Set();
      
      const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
      cam.pc = pc;
      
      pc.ontrack = (e) => {
        cam.stream = e.streams[0];
        updateCameraGrid();
        
        // If this was selected, update main
        const outputVideo = document.getElementById('outputVideo');
        if (outputVideo.dataset.camId === camId) {
          outputVideo.srcObject = cam.stream;
        }
      };
      
      pc.onicecandidate = async (e) => {
        if (e.candidate && !e.candidate.candidate.includes('.local')) {
          const id = `out_${Date.now()}_${Math.random().toString(36).substr(2,4)}`;
          await DB.set(`streams/${camId}/outputCandidates/${id}`, e.candidate.toJSON());
        }
      };
      
      // Create offer
      pc.addTransceiver('video', { direction: 'recvonly' });
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      
      await DB.set(`streams/${camId}/outputOffer`, { type: offer.type, sdp: offer.sdp });
      
      // Listen for answer
      const unsubAnswer = DB.listen(`streams/${camId}/outputAnswer`, async (answer) => {
        if (!answer || !pc || pc.signalingState === 'stable') return;
        await pc.setRemoteDescription(new RTCSessionDescription(answer));
        
        // Listen for candidates
        DB.listen(`streams/${camId}/outputCameraCandidates`, async (cands) => {
          if (!cands || !pc) return;
          for (const [id, cand] of Object.entries(cands)) {
            if (cam.addedCandidates.has(id)) continue;
            try {
              await pc.addIceCandidate(new RTCIceCandidate(cand));
              cam.addedCandidates.add(id);
            } catch(e) {}
          }
        });
      });
      cam.unsubscribers.push(unsubAnswer);
    }
    
    // Source buttons
    document.querySelectorAll('.source-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSlot = parseInt(btn.dataset.slot);
        
        // Find camera assigned to this slot from regia
        // For now, just select the Nth camera
        const cams = Array.from(cameras.keys());
        if (cams[activeSlot]) {
          selectCamera(cams[activeSlot]);
        }
      });
    });
    
    // Overlay toggles
    window.toggleOverlay = (el) => {
      el.classList.toggle('on');
      const overlay = el.dataset.overlay;
      
      const elements = {
        'logo': document.querySelector('.logo'),
        'live': document.getElementById('liveBadge'),
        'timer': document.getElementById('overlayTimer'),
        'wod': document.getElementById('overlayWod')
      };
      
      if (elements[overlay]) {
        elements[overlay].style.display = el.classList.contains('on') ? '' : 'none';
      }
    };
    
    // Timer sync from Firebase
    DB.listen('currentHeat', (heat) => {
      if (!heat) return;
      
      const timerEl = document.getElementById('timerValue');
      if (heat.status === 'countdown') {
        timerEl.className = 'timer-value countdown';
        timerEl.textContent = heat.countdown || '10';
      } else if (heat.status === 'running') {
        timerEl.className = 'timer-value running';
        // Timer would be calculated from startTime
      } else {
        timerEl.className = 'timer-value stopped';
      }
    });
    
    // Initialize
    document.getElementById('noVideo').style.display = 'flex';
  </script>
</body>
</html>
