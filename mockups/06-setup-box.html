<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Box - Mockup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding-bottom: 100px;
        }
        .mockup-label {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 100;
        }
        .back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 100;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 70px 20px 30px;
            text-align: center;
        }
        header h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        header p {
            color: #888;
        }
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            color: #666;
        }
        .step.active {
            color: #f39c12;
        }
        .step.done {
            color: #27ae60;
        }
        .step-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .step.active .step-dot {
            background: #f39c12;
            color: #000;
        }
        .step.done .step-dot {
            background: #27ae60;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #f39c12;
        }
        .logo-upload {
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
        }
        .logo-upload:hover {
            border-color: #f39c12;
        }
        .logo-upload .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .logo-upload p {
            color: #888;
            font-size: 0.9rem;
        }
        .color-picker {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .color-option {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
        }
        .color-option:hover {
            transform: scale(1.1);
        }
        .color-option.selected {
            border-color: white;
        }
        .preview-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .preview-card .box-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            border-radius: 16px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .preview-card h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        .preview-card p {
            color: #888;
            font-size: 0.9rem;
        }
        .cta-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .skip-btn {
            color: #888;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
        }
        .next-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="mockup-label">MOCKUP</div>
    <a href="05-admin-login.html" class="back-btn">← Indietro</a>
    
    <header>
        <h1>⚙️ Configura il tuo Box</h1>
        <p>Personalizza l'esperienza per i tuoi atleti</p>
        
        <div class="progress-bar">
            <div class="step active">
                <span class="step-dot">1</span>
                <span>Info</span>
            </div>
            <div class="step">
                <span class="step-dot">2</span>
                <span>Look</span>
            </div>
            <div class="step">
                <span class="step-dot">3</span>
                <span>Fatto!</span>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div class="section">
            <h2>📋 Informazioni Base</h2>
            <div class="form-group">
                <label>Nome del Box *</label>
                <input type="text" placeholder="Es: CrossFit Roma" value="CrossFit ARK">
            </div>
            <div class="form-group">
                <label>Città</label>
                <input type="text" placeholder="Es: Roma" value="Roma">
            </div>
            <div class="form-group">
                <label>Email di contatto</label>
                <input type="email" placeholder="info@tuobox.com" value="info@crossfitark.it">
            </div>
        </div>
        
        <div class="section">
            <h2>🎨 Logo</h2>
            <div class="logo-upload">
                <div class="icon">📤</div>
                <p>Clicca per caricare il logo</p>
                <p style="font-size: 0.75rem; color: #666; margin-top: 5px;">PNG o JPG, max 2MB</p>
            </div>
        </div>
        
        <div class="section">
            <h2>🎨 Colore Principale</h2>
            <div class="color-picker">
                <div class="color-option selected" style="background: linear-gradient(135deg, #f39c12, #e74c3c);"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #3498db, #2980b9);"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #27ae60, #2ecc71);"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #9b59b6, #8e44ad);"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #e74c3c, #c0392b);"></div>
                <div class="color-option" style="background: linear-gradient(135deg, #1abc9c, #16a085);"></div>
            </div>
        </div>
        
        <div class="section">
            <h2>👁️ Anteprima</h2>
            <div class="preview-card">
                <div class="box-logo">🦁</div>
                <h3>CrossFit ARK</h3>
                <p>Roma</p>
            </div>
        </div>
    </div>
    
    <div class="cta-bar">
        <button class="skip-btn">Salta per ora</button>
        <button class="next-btn" onclick="location.href='07-dashboard.html'">Continua →</button>
    </div>
</body>
</html>
