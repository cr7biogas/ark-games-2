<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Mockup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .mockup-label {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 100;
        }
        .back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 100;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .logo h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #f39c12;
        }
        .form-group input::placeholder {
            color: #666;
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        .login-btn:hover {
            opacity: 0.9;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #666;
            font-size: 0.85rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span {
            padding: 0 15px;
        }
        .register-link {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
        }
        .register-link a {
            color: #f39c12;
            text-decoration: none;
        }
        .demo-note {
            margin-top: 30px;
            padding: 15px;
            background: rgba(52, 152, 219, 0.1);
            border: 1px solid #3498db;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #3498db;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="mockup-label">MOCKUP</div>
    <a href="index.html" class="back-btn">← Indietro</a>
    
    <div class="login-box">
        <div class="logo">
            <div class="icon">⚙️</div>
            <h1>ARK GAMES</h1>
            <p>Area Organizzatori</p>
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="email@tuobox.com">
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••">
        </div>
        
        <button class="login-btn" onclick="location.href='07-dashboard.html'">
            Accedi →
        </button>
        
        <div class="divider">
            <span>oppure</span>
        </div>
        
        <p class="register-link">
            Non hai un account? <a href="06-setup-box.html">Registra il tuo Box →</a>
        </p>
        
        <div class="demo-note">
            💡 <strong>Demo:</strong> Clicca "Accedi" per vedere la dashboard
        </div>
    </div>
</body>
</html>
